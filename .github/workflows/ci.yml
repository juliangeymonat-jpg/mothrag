name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      # The test suite needs the retrieval + gemini extras at collection time
      # (plugins import networkx; embedder-spec tests construct GeminiEmbedder).
      - run: pip install -e ".[dev,retrieval,gemini]"
      # Lint is scoped to the surfaces this gate owns: the repo has ~85
      # pre-existing findings in legacy research files; a repo-wide baseline
      # cleanup is a separate change so this gate can land green and strict.
      - run: ruff check mothrag/cli tests/test_entry_points.py tests/test_version_sync.py tests/test_reader_fallback.py
      - run: ruff format --check mothrag/cli tests/test_entry_points.py tests/test_version_sync.py tests/test_reader_fallback.py
      - run: pytest

  acceptance:
    name: released-artifact acceptance gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Install the built wheel in a clean venv and run the documented commands
        run: bash scripts/acceptance.sh /tmp/acc
