name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest

  acceptance:
    name: released-artifact acceptance gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Install the built wheel in a CLEAN venv and run the documented commands
        # This is the guard for the 0.6.0-class defect: the entry point / quickstart
        # is exercised against the RELEASED artifact, not the in-place source tree.
        run: |
          set -euo pipefail
          python -m venv /tmp/acc
          /tmp/acc/bin/pip install --upgrade pip
          /tmp/acc/bin/pip install dist/*.whl
          /tmp/acc/bin/mothrag --version
          /tmp/acc/bin/mothrag --help
          /tmp/acc/bin/mothrag query "Where is the Eiffel Tower?" \
            --text "The Eiffel Tower is a wrought-iron lattice tower in Paris, France." \
            --embedder hash
          # Entry-point completeness against the INSTALLED wheel (not the source tree).
          /tmp/acc/bin/python tests/test_entry_points.py
